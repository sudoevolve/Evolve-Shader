name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      BUILD_CONFIGURATION: Release
      BUILD_PLATFORM: x64
      BUILD_TOOLSET: v143
      VCPKG_TRIPLET: x64-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Prepare package metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          }
          else {
            $version = "manual-${{ github.run_number }}"
          }

          "archive_name=Evolve-Shader-$version-windows-x64.zip" >> $env:GITHUB_OUTPUT
          "package_root=dist\Evolve-Shader" >> $env:GITHUB_OUTPUT

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:GITHUB_WORKSPACE\vcpkg"
          & "$env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat"
          & "$env:GITHUB_WORKSPACE\vcpkg\vcpkg.exe" integrate install
          & "$env:GITHUB_WORKSPACE\vcpkg\vcpkg.exe" install glfw3 glad stb --triplet $env:VCPKG_TRIPLET

      - name: Build solution
        shell: pwsh
        run: |
          msbuild "Evolve shader.sln" /p:Configuration=$env:BUILD_CONFIGURATION /p:Platform=$env:BUILD_PLATFORM /p:PlatformToolset=$env:BUILD_TOOLSET /m /verbosity:minimal

      - name: Assemble release package
        shell: pwsh
        run: |
          $packageRoot = Join-Path $env:GITHUB_WORKSPACE "${{ steps.meta.outputs.package_root }}"
          $archivePath = Join-Path $env:GITHUB_WORKSPACE "dist\${{ steps.meta.outputs.archive_name }}"
          $glfwDll = Join-Path $env:GITHUB_WORKSPACE "x64\Release\glfw3.dll"

          Remove-Item -Recurse -Force $packageRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null

          if (-not (Test-Path $glfwDll)) {
            $glfwDll = Join-Path $env:GITHUB_WORKSPACE "vcpkg\installed\$env:VCPKG_TRIPLET\bin\glfw3.dll"
          }

          if (-not (Test-Path $glfwDll)) {
            throw "glfw3.dll not found in build output or vcpkg bin directory."
          }

          Copy-Item "x64\Release\Evolve shader.exe" $packageRoot
          Copy-Item $glfwDll $packageRoot
          Copy-Item -Recurse "frag" (Join-Path $packageRoot "frag")

          if (Test-Path "iChannel") {
            Copy-Item -Recurse "iChannel" (Join-Path $packageRoot "iChannel")
          }

          foreach ($file in @("LICENSE", "readme.md", "README.zh-CN.md", "1.png", "2.png")) {
            if (Test-Path $file) {
              Copy-Item $file $packageRoot
            }
          }

          Remove-Item -Force $archivePath -ErrorAction SilentlyContinue
          Compress-Archive -Path $packageRoot -DestinationPath $archivePath -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.archive_name }}
          path: dist\${{ steps.meta.outputs.archive_name }}

      - name: Publish GitHub release asset
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $archivePath = Join-Path $env:GITHUB_WORKSPACE "dist\${{ steps.meta.outputs.archive_name }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $archivePath --title $tag --generate-notes
          }
          else {
            gh release upload $tag $archivePath --clobber
          }
